<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campos de Golfe Portugal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4f1;color:#1a1a1a;min-height:100vh}
a{color:#1a472a}
input,select{font-family:inherit}
.btn{cursor:pointer;font-family:inherit}

/* Header */
.header{background:linear-gradient(135deg,#1a472a,#2d6a4f);padding:28px 20px 44px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;opacity:.06;
  background-image:repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%);
  background-size:18px 18px}
.header-inner{max-width:920px;margin:0 auto;position:relative}
.header h1{color:#fff;font-size:22px;font-weight:700;margin-bottom:2px}
.header p{color:rgba(255,255,255,.65);font-size:13px;margin-bottom:20px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.stat-box{background:rgba(255,255,255,.13);border-radius:10px;padding:10px;text-align:center}
.stat-box .val{color:#fff;font-size:22px;font-weight:700}
.stat-box .lbl{color:rgba(255,255,255,.6);font-size:11px;margin-top:2px}

/* Filtros */
.filters-wrap{max-width:920px;margin:-18px auto 0;padding:0 16px;position:relative;z-index:10}
.filters{background:#fff;border-radius:14px;padding:14px;box-shadow:0 4px 20px rgba(0,0,0,.1);
  display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px}
.filters input,.filters select{padding:9px 11px;border-radius:8px;border:1px solid #ddd;font-size:14px;width:100%;outline:none}
.result-count{font-size:12px;color:#999;margin:8px 0 0 4px}

/* Grid */
.grid{max-width:920px;margin:16px auto 48px;padding:0 16px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:14px}
.card{background:#fff;border-radius:12px;padding:16px;cursor:pointer;
  border:1px solid #e5e5e5;transition:transform .15s,box-shadow .15s;
  box-shadow:0 2px 8px rgba(0,0,0,.05)}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-nome{font-size:14px;font-weight:700;color:#1a1a1a;line-height:1.3;margin-bottom:3px}
.card-loc{font-size:12px;color:#999}
.slope-badge{border-radius:8px;padding:4px 9px;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0;margin-left:8px}
.tees-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.facs-row{display:flex;flex-wrap:wrap;gap:5px}
.fac-tag{background:#f0f7f2;color:#2d6a4f;border-radius:5px;padding:2px 7px;font-size:11px}
.fac-more{color:#bbb;font-size:11px;align-self:center}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;
  display:flex;align-items:flex-start;justify-content:center;
  padding:20px 12px;overflow-y:auto}
.modal{background:#fff;border-radius:16px;width:100%;max-width:720px;
  box-shadow:0 20px 60px rgba(0,0,0,.25);margin:auto}
.modal-header{background:linear-gradient(135deg,#1a472a,#2d6a4f);border-radius:16px 16px 0 0;padding:20px 24px;position:relative}
.modal-header h2{color:#fff;font-size:18px;font-weight:700;margin-bottom:3px;padding-right:36px}
.modal-header p{color:rgba(255,255,255,.7);font-size:13px}
.close-btn{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.2);border:none;
  color:#fff;border-radius:50%;width:30px;height:30px;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1}
.modal-body{padding:20px 24px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.info-item{background:#f8f8f8;border-radius:8px;padding:8px 10px;font-size:13px;color:#444;
  display:flex;gap:7px;align-items:flex-start;word-break:break-word}
.section-label{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:8px}
.facs-section{margin-bottom:18px}
.facs-section .fac-tag{font-size:12px;padding:3px 9px;border-radius:6px}
.tab-btns{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab-btn{padding:5px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.tab-btn.active{background:#1a472a;color:#fff}
.tab-btn.inactive{background:#f0f0f0;color:#555}
.arch{font-size:12px;color:#888;margin-bottom:12px}
table.scorecard{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px}
table.scorecard th{padding:8px 10px;text-align:center;font-size:11px;font-weight:700;color:#1a472a;background:#f0f7f2}
table.scorecard th:first-child{text-align:left}
table.scorecard td{padding:9px 10px;text-align:center;border-top:1px solid #f0f0f0}
table.scorecard td:first-child{text-align:left}
table.scorecard tr:nth-child(even){background:#fafafa}
table.scorecard tr.highlight{background:#f0f7f2}
table.holes{width:100%;border-collapse:collapse;font-size:12px}
table.holes th{padding:6px 8px;text-align:center;font-size:11px;font-weight:700;color:#1a472a;background:#f0f7f2}
table.holes td{padding:6px 8px;text-align:center;border-top:1px solid #f0f0f0}
table.holes tr:nth-child(even){background:#fafafa}
.overflow-x{overflow-x:auto;margin-bottom:16px}
.hcp-box{background:#f8f8f8;border-radius:10px;padding:14px 16px;margin-bottom:16px}
.hcp-inputs{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
.hcp-inputs input,.hcp-inputs select{padding:8px 10px;border-radius:7px;border:1px solid #ddd;font-size:14px}
.hcp-result{margin-top:12px;background:#1a472a;border-radius:8px;padding:10px 16px;display:inline-flex;align-items:center;gap:10px}
.hcp-result .label{color:rgba(255,255,255,.7);font-size:12px}
.hcp-result .value{color:#fff;font-size:24px;font-weight:700}
@media(max-width:600px){
  .filters{grid-template-columns:1fr 1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .info-grid{grid-template-columns:1fr}
  .modal-body{padding:16px}
}
</style>
</head>

const TEE_COLORS = {
  'Branco':  {bg:'#ffffff',border:'#cccccc',text:'#222222'},
  'Amarelo': {bg:'#ffe600',border:'#c9a000',text:'#5a4000'},
  'Vermelho':{bg:'#e53935',border:'#b71c1c',text:'#ffffff'},

  'Laranja': {bg:'#e65100',border:'#bf360c',text:'#ffffff'},
};

function teeBadgeHTML(cor) {
  const s = TEE_COLORS[cor] || {bg:'#888',border:'#555',text:'#fff'};
  return `<span style="display:inline-block;padding:2px 9px;border-radius:11px;
    background:${s.bg};border:1px solid ${s.border};color:${s.text};
    font-size:11px;font-weight:600">${cor}</span>`;
}

function slopeColor(s) {
  return s >= 130 ? '#c0392b' : s >= 120 ? '#e67e22' : '#27ae60';
}
function slopeBg(s) {
  return s >= 130 ? '#ffeaea' : s >= 120 ? '#fff3e0' : '#e8f5e9';
}

// ── FILTER & RENDER GRID ───────────────────────────────────
function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const dist = document.getElementById('sel-distrito').value;
  const fac = document.getElementById('sel-fac').value;
  const sort = document.getElementById('sel-sort').value;

  let list = CAMPOS.filter(c => {
    if (q && !c.nome.toLowerCase().includes(q) && !(c.cidade||'').toLowerCase().includes(q)) return false;
    if (dist && c.distrito !== dist) return false;
    if (fac && !(c.facilidades||[]).includes(fac)) return false;
    return true;
  });

  list.sort((a,b) => {
    if (sort === 'nome') return a.nome.localeCompare(b.nome);
    if (sort === 'distrito') return (a.distrito||'').localeCompare(b.distrito||'');
    if (sort === 'slope') {
      const sa = (a.cartoes&&a.cartoes[0]&&a.cartoes[0].tees&&a.cartoes[0].tees[0]&&a.cartoes[0].tees[0].slope_homens)||0;
      const sb = (b.cartoes&&b.cartoes[0]&&b.cartoes[0].tees&&b.cartoes[0].tees[0]&&b.cartoes[0].tees[0].slope_homens)||0;
      return sb - sa;
    }
    return 0;
  });
  return list;
}

function renderGrid() {
  const list = getFiltered();
  document.getElementById('result-count').textContent = list.length + ' campos encontrados';
  const grid = document.getElementById('grid');
  grid.innerHTML = list.map(campo => {
    const cartao = campo.cartoes && campo.cartoes[0];
    const tees = cartao ? cartao.tees || [] : [];
    const slopes = tees.map(t=>t.slope_homens||0).filter(Boolean);
    const maxSlope = slopes.length ? Math.max(...slopes) : 0;
    const hasGPS = !!campo.coordenadas;
    const facsHTML = (campo.facilidades||[]).slice(0,4).map(f=>
      `<span class="fac-tag">${f}</span>`).join('') +
      ((campo.facilidades||[]).length > 4 ? `<span class="fac-more">+${campo.facilidades.length-4}</span>` : '');
    const teesHTML = tees.map(t=>teeBadgeHTML(t.cor)).join('');
    return `<div class="card" onclick="openModal(${campo.id})">
      <div class="card-top">
        <div style="flex:1">
          <div class="card-nome">${campo.nome}</div>
          <div class="card-loc">${[campo.cidade,campo.distrito].filter(Boolean).join(', ')}${hasGPS?' 📍':''}</div>
        </div>
        ${maxSlope ? `<span class="slope-badge" style="background:${slopeBg(maxSlope)};color:${slopeColor(maxSlope)}">${maxSlope}</span>` : ''}
      </div>
      ${teesHTML ? `<div class="tees-row">${teesHTML}</div>` : ''}
      <div class="facs-row">${facsHTML}</div>
    </div>`;
  }).join('');
}

['search','sel-distrito','sel-fac','sel-sort'].forEach(id =>

renderGrid();

// ── MODAL ──────────────────────────────────────────────────
let currentCampo = null;
let activeCartao = 0;
let activeTee = 0;
let hcpGenero = 'homens';

function openModal(id) {
  currentCampo = CAMPOS.find(c=>c.id===id);
  activeCartao = 0;
  activeTee = 0;
  hcpGenero = 'homens';
  renderModal();
  document.getElementById('overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').style.display = 'none';
  document.body.style.overflow = '';
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function setCartao(i) { activeCartao = i; activeTee = 0; renderModal(); }
function setTee(i) { activeTee = i; renderModal(); }
function setGenero(v) { hcpGenero = v; renderModal(); }

function calcHCP() {
  const val = document.getElementById('hcp-input') && document.getElementById('hcp-input').value;
  const idx = parseFloat(val);
  if (isNaN(idx)) return;
  const campo = currentCampo;
  const cartao = campo.cartoes && campo.cartoes[activeCartao];
  const tee = cartao && cartao.tees && cartao.tees[activeTee];
  if (!tee) return;
  const cr = hcpGenero === 'homens' ? tee.cr_homens : tee.cr_senhoras;
  const slope = hcpGenero === 'homens' ? tee.slope_homens : tee.slope_senhoras;
  const par = tee.par_total || cartao.tees[0].par_total || 72;
  if (!cr || !slope) return;
  const result = Math.round((idx * slope / 113) + (cr - par));
  const el = document.getElementById('hcp-result');
  if (el) {
    el.style.display = 'inline-flex';
    el.querySelector('.value').textContent = result >= 0 ? '+'+result : result;
  }
}

  // Scorecard table

            <td style="font-weight:700;color:${slopeColor(t.slope_homens||0)}">${t.slope_homens||'—'}</td>
            <td>${t.cr_senhoras||'—'}</td>
            <td style="font-weight:700;color:${slopeColor(t.slope_senhoras||0)}">${t.slope_senhoras||'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table></div>`;
  }

  // HCP calculator
  const hcpHTML = `
    <div class="hcp-box">
      <div class="section-label">Calculadora Handicap de Campo</div>
      <div class="hcp-inputs">
        <input type="number" id="hcp-input" min="-10" max="54" step="0.1" placeholder="Handicap Index" style="width:160px" oninput="calcHCP()">
        <select onchange="setGenero(this.value)">
          <option value="homens">♂ Homens</option>
          <option value="senhoras">♀ Senhoras</option>
        </select>
        <span style="font-size:13px;color:#666">Tee: ${tees[activeTee]?.cor||'—'}</span>
      </div>
      <div id="hcp-result" class="hcp-result" style="display:none;margin-top:12px">
        <span class="label">Handicap de Campo</span>
        <span class="value">—</span>
      </div>
    </div>`;

  // Buracos table
  let buracosHTML = '';
  if (cartao && cartao.buracos && cartao.buracos.length) {
    const cores = Object.keys(cartao.buracos[0].metros || {});
    buracosHTML = `
      <div class="section-label">Buraco a Buraco</div>
      <div class="overflow-x">
      <table class="holes">
        <thead><tr>
          <th>#</th><th>Par</th><th>S.I.</th>
          ${cores.map(cor=>`<th>${teeBadgeHTML(cor)}</th>`).join('')}
        </tr></thead>
        <tbody>${cartao.buracos.map((b,i)=>`
          <tr>
            <td style="font-weight:700;color:#1a472a">${b.buraco}</td>
            <td style="font-weight:600">${b.par||'—'}</td>
            <td style="color:#999">${b.si||'—'}</td>
            ${cores.map(cor=>`<td style="color:#555">${(b.metros&&b.metros[cor])||'—'}</td>`).join('')}
          </tr>`).join('')}
        </tbody>
      </table></div>`;
  }

  document.getElementById('modal').innerHTML = `
    <div class="modal-header">
      <button class="close-btn btn" onclick="closeModal()">×</button>
      <h2>${c.nome}</h2>
      <p>${[c.cidade,c.distrito].filter(Boolean).join(' · ')}
        ${c.coordenadas?`&nbsp;·&nbsp;<a href="https://maps.google.com/?q=${c.coordenadas.lat},${c.coordenadas.lon}"
          target="_blank" rel="noopener" style="color:rgba(255,255,255,.85)">📍 Ver no mapa</a>`:''}
      </p>
    </div>
    <div class="modal-body">
      <div class="info-grid">
        ${infoItems.map(([icon,val])=>`<div class="info-item"><span>${icon}</span><span>${val}</span></div>`).join('')}
      </div>
      ${(c.facilidades&&c.facilidades.length)?`
        <div class="facs-section">
          <div class="section-label">Facilidades</div>
          <div class="facs-row">${c.facilidades.map(f=>`<span class="fac-tag">${f}</span>`).join('')}</div>
        </div>`:''}
      ${tabsHTML}
      ${cartao&&cartao.arquitecto?`<p class="arch">🏗️ Arquitecto: <strong>${cartao.arquitecto}</strong></p>`:''}
      ${scorecardHTML}
      ${tees.length ? hcpHTML : ''}
      ${buracosHTML}
    </div>`;
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>
</body>
</html>
